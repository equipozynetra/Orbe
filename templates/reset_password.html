<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Orbe</title>
    <!-- Reutilizamos el mismo CSS del login para mantener la coherencia visual -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-orb"></div>
    <div class="login-container">
        <div class="form-header">
            <h1>Crea una Nueva Contraseña</h1>
        </div>
        
        <!-- Área para mostrar mensajes de error (ej: las contraseñas no coinciden) -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="message-area {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- El formulario envía los datos a la misma URL, incluyendo el token -->
        <form method="POST" action="{{ url_for('reset_password', token=token) }}">
            <div class="form-group">
                <label for="password">Nueva Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required>
                    <i class="fa-solid fa-eye-slash password-toggle"></i>
                </div>
                <!-- Aquí podríamos añadir el medidor de fuerza si quisiéramos -->
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirmar Nueva Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm_password" name="confirm_password" required>
                    <i class="fa-solid fa-eye-slash password-toggle"></i>
                </div>
            </div>
            <button type="submit" class="submit-button">Cambiar Contraseña</button>
        </form>
    </div>

    <!-- Pequeño script solo para esta página, para manejar el icono de ojo -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const passwordToggles = document.querySelectorAll('.password-toggle');
            passwordToggles.forEach(toggle => {
                toggle.addEventListener('click', () => {
                    const passwordInput = toggle.previousElementSibling;
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    toggle.classList.toggle('fa-eye');
                    toggle.classList.toggle('fa-eye-slash');
                });
            });
        });
    </script>
</body>
</html>
