<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso a Orbe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-orb"></div>
    <div class="login-container">
        <div class="form-header"><h1>Accede a Orbe</h1></div>
        <div class="form-flipper">
            <!-- Formulario de Iniciar Sesión -->
            <div id="login-form-wrapper" class="form-wrapper">
                <h2>Iniciar Sesión</h2>
                <div id="login-message-area" class="message-area"></div>
                <form id="login-form">
                    <div class="form-group"><label for="login-email">Correo Electrónico</label><input type="email" id="login-email" required autocomplete="email"></div>
                    <div class="form-group">
                        <label for="login-password">Contraseña</label>
                        <div class="password-wrapper">
                            <input type="password" id="login-password" required autocomplete="current-password">
                            <i class="fa-solid fa-eye-slash password-toggle"></i>
                        </div>
                    </div>
                    <button type="submit" class="submit-button">Continuar</button>
                </form>
                <p class="toggle-text">¿No tienes cuenta? <a href="#" id="show-register">Regístrate</a></p>
            </div>
            <!-- Formulario de Registro -->
            <div id="register-form-wrapper" class="form-wrapper">
                <h2>Crear Cuenta</h2>
                <div id="register-message-area" class="message-area"></div>
                <form id="register-form">
                    <div class="form-group"><label for="register-name">Nombre Completo</label><input type="text" id="register-name" required autocomplete="name"></div>
                    <div class="form-group"><label for="register-email">Correo Electrónico</label><input type="email" id="register-email" required autocomplete="email"></div>
                    <div class="form-group">
                        <label for="register-password">Contraseña</label>
                        <div class="password-wrapper">
                            <input type="password" id="register-password" required autocomplete="new-password">
                            <i class="fa-solid fa-eye-slash password-toggle"></i>
                        </div>
                        <div class="strength-bar"><div id="strength-fill" class="strength-fill"></div></div>
                        <ul id="password-policy">
                            <li id="policy-length">Mínimo 8 caracteres</li>
                            <li id="policy-uppercase">Una mayúscula</li>
                            <li id="policy-number">Un número</li>
                            <li id="policy-special">Un carácter especial</li>
                        </ul>
                    </div>
                    <!-- CAMPO "CONFIRMAR CONTRASEÑA" AÑADIDO DE NUEVO -->
                    <div class="form-group">
                        <label for="register-confirm-password">Confirmar Contraseña</label>
                        <div class="password-wrapper">
                            <input type="password" id="register-confirm-password" required autocomplete="new-password">
                            <i class="fa-solid fa-eye-slash password-toggle"></i>
                        </div>
                    </div>
                    <button type="submit" id="register-submit-button" class="submit-button" disabled>Crear cuenta</button>
                </form>
                <p class="toggle-text">¿Ya tienes cuenta? <a href="#" id="show-login">Inicia sesión</a></p>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
